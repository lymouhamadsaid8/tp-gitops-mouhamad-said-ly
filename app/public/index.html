<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mouhamad Said Ly — Plateforme GitOps</title>
<style>
  :root {
    --bg1: #0f172a;
    --bg2: #1e1b4b;
    --accent: #22d3ee;
    --accent2: #a78bfa;
    --card-bg: rgba(255, 255, 255, 0.07);
    --border: rgba(255, 255, 255, 0.14);
    --text: #f1f5f9;
    --muted: #94a3b8;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, system-ui, sans-serif;
    background: radial-gradient(circle at 20% 20%, var(--bg2), transparent 60%),
                radial-gradient(circle at 80% 80%, #0891b233, transparent 60%),
                var(--bg1);
    color: var(--text);
    padding: 24px;
  }
  .card {
    width: 100%;
    max-width: 620px;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 48px 40px;
    backdrop-filter: blur(18px);
    box-shadow: 0 20px 60px rgba(0,0,0,0.45);
  }
  .live {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 20px;
  }
  .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 0 0 rgba(34,211,238,0.7);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(34,211,238,0.5); }
    70% { box-shadow: 0 0 0 10px rgba(34,211,238,0); }
    100% { box-shadow: 0 0 0 0 rgba(34,211,238,0); }
  }
  h1 {
    margin: 0 0 6px;
    font-size: 34px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .subtitle { color: var(--muted); margin: 0 0 32px; font-size: 15px; }
  .badges {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .badge {
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 16px;
  }
  .badge .label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); }
  .badge .value { font-size: 15px; font-weight: 600; margin-top: 4px; word-break: break-all; }
  footer { margin-top: 32px; font-size: 12px; color: var(--muted); text-align: center; }
</style>
</head>
<body>
  <div class="card">
    <div class="live"><span class="dot"></span> service en ligne</div>
    <h1>Mouhamad Said Ly</h1>
    <p class="subtitle">Plateforme GitOps observable — TP individuel Kubernetes</p>
    <div class="badges">
      <div class="badge"><div class="label">Version (git sha)</div><div class="value">{{VERSION}}</div></div>
      <div class="badge"><div class="label">Build</div><div class="value">{{BUILD_DATE}}</div></div>
      <div class="badge"><div class="label">Namespace</div><div class="value">{{NAMESPACE}}</div></div>
      <div class="badge"><div class="label">Pod</div><div class="value">{{POD_NAME}}</div></div>
    </div>
    <footer>Déployée via Argo CD · Helm · Kubernetes 3 nœuds</footer>
  </div>
</body>
</html>
